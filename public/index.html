<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 Reveal Your Position - Galactic Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --void: #050508;
            --nebula-deep: #0f0f1e;
            --cosmic-blue: #1e3a8a;
            --starlight: #60a5fa;
            --nebula-pink: #c026d3;
            --supernova-gold: #fbbf24;
            --alien-green: #34d399;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--void);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        /* Deep Space Background */
        .cosmos {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%),
                linear-gradient(to bottom, #0a0e27 0%, #000000 100%);
        }

        /* Animated Galaxy */
        .galaxy {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            transform: translate(-50%, -50%);
            background: 
                radial-gradient(circle at 30% 50%, rgba(76, 29, 149, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(192, 38, 211, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.2) 0%, transparent 60%);
            animation: galaxyRotate 120s linear infinite;
            z-index: -1;
        }

        @keyframes galaxyRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Star Field */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .cosmic-dust {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { 
                transform: translateY(100vh) translateX(0) scale(0); 
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { 
                transform: translateY(-100px) translateX(100px) scale(1); 
                opacity: 0;
            }
        }

        /* Shooting Stars */
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, white, transparent);
            animation: shoot 3s linear infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(-100px) translateY(100px); opacity: 1; }
            100% { transform: translateX(300px) translateY(-100px); opacity: 0; }
        }

        /* Main Container */
        .portal {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .celestial-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        .logo-glow {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--starlight), var(--nebula-pink), var(--supernova-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(96, 165, 250, 0.5);
            margin-bottom: 10px;
            position: relative;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Login Nebula */
        .nebula-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 480px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(96, 165, 250, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .nebula-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.1) 0%, transparent 70%);
            animation: nebulaPulse 4s ease-in-out infinite;
        }

        @keyframes nebulaPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .input-wormhole {
            margin-bottom: 25px;
        }

        .input-wormhole label {
            display: block;
            margin-bottom: 10px;
            color: var(--starlight);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .cosmic-input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(5, 5, 8, 0.8);
            border: 2px solid rgba(96, 165, 250, 0.3);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-family: 'Exo 2', sans-serif;
            transition: all 0.3s;
            position: relative;
        }

        .cosmic-input:focus {
            outline: none;
            border-color: var(--starlight);
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.3);
            background: rgba(5, 5, 8, 0.95);
        }

        .cosmic-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .date-hint {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Warp Button */
        .warp-button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--cosmic-blue), var(--nebula-pink));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(192, 38, 211, 0.3);
        }

        .warp-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s;
        }

        .warp-button:hover::before {
            left: 100%;
        }

        .warp-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(192, 38, 211, 0.5);
        }

        .warp-button:active {
            transform: translateY(-1px);
        }

        /* Status Indicator */
        .server-status {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 30px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--alien-green);
            box-shadow: 0 0 10px var(--alien-green);
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Reveal Card - Holographic */
        .hologram-container {
            display: none;
            perspective: 2000px;
            width: 100%;
            max-width: 500px;
            animation: fadeIn 1s ease;
        }

        .hologram-card {
            width: 100%;
            height: 650px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .hologram-card.revealed {
            transform: rotateY(180deg) !important;
            pointer-events: none;
        }

        .hologram-card.revealed .reveal-side {
            pointer-events: auto; /* Re-enable untuk button di dalam */
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            overflow: hidden;
        }

        /* Front - Mystery */
        .mystery-side {
            z-index: 2;
            transform: scale(1.1);
            filter: drop-shadow(0 0 30px rgba(96, 165, 250, 1));
            background: linear-gradient(145deg, rgba(30, 58, 138, 0.9), rgba(88, 28, 135, 0.9));
            border: 2px solid rgba(96, 165, 250, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 
                0 0 60px rgba(96, 165, 250, 0.2),
                inset 0 0 60px rgba(255, 255, 255, 0.05);
        }

        .mystery-side:hover .mystery-icon {
            transform: scale(1.1);
            filter: drop-shadow(0 0 30px rgba(96, 165, 250, 1));
        }

        .mystery-side:active {
            transform: scale(0.98);
        }

        .mystery-side::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(96, 165, 250, 0.3), transparent 30%);
            animation: hologramRotate 8s linear infinite;
        }

        @keyframes hologramRotate {
            to { transform: rotate(360deg); }
        }

        .mystery-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .mystery-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(96, 165, 250, 0.8));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .mystery-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to right, white, var(--starlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .mystery-hint {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        /* Back - Reveal */
        .reveal-side {
           background: linear-gradient(145deg, #0f172a, #1e1b4b);
            border: 2px solid rgba(251, 191, 36, 0.5);
            transform: rotateY(180deg);
            padding: 30px 25px; /* Kurangi padding horizontal */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 80px rgba(251, 191, 36, 0.2);
            overflow-y: auto; /* Tambah scroll jika perlu */
            max-height: 100%; /* Batasi tinggi */
        }

        .reveal-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(251, 191, 36, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(192, 38, 211, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .avatar-glow {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--supernova-gold), var(--nebula-pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 20px;
            box-shadow: 
                0 0 40px rgba(251, 191, 36, 0.5),
                0 0 80px rgba(251, 191, 36, 0.3);
            animation: avatarPulse 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
    .hologram-card { 
        height: auto; /* Auto height */
        min-height: 500px;
        max-height: 80vh; /* Batasi tinggi viewport */
    }
    
    .reveal-side {
        padding: 20px 15px;
        overflow-y: auto; /* Scroll jika konten panjang */
    }
    
    .crystal-value {
        font-size: 1.2rem; /* Kecilin font di mobile */
    }
    
    .recipient-name {
        font-size: 1.3rem;
    }
    
    .data-crystal {
        padding: 15px;
        margin-bottom: 10px;
    }
}

/* Fix untuk teks yang sangat panjang - tambahkan ellipsis jika perlu */
.crystal-value.long-text {
    font-size: 1.1rem; /* Kecilin jika teks panjang */
}

/* Ensure proper box sizing */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box; /* Pastikan semua element pakai border-box */
}

        @keyframes avatarPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(251, 191, 36, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(251, 191, 36, 0.8); }
        }

        .recipient-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem; /* Sedikit kecilin */
            text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(to right, white, var(--starlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
            line-height: 1.4; /* Tambah line height */
            word-wrap: break-word;
            max-width: 100%;
            padding: 0 10px;
        }

        .recipient-id {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        /* Data Crystals */
        .data-crystal {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 16px;
            padding: 20px; /* Sedikit kurangi padding */
            margin-bottom: 15px; /* Kurangi margin */
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: all 0.3s;
            min-height: 80px; /* Minimum height */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .data-crystal:hover {
            border-color: rgba(96, 165, 250, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(96, 165, 250, 0.2);
        }

        .data-crystal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--starlight), var(--nebula-pink));
        }

        .crystal-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--starlight);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .crystal-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--text-primary);
            font-weight: 700;
            line-height: 1.3; /* Tambah line height */
            word-wrap: break-word; /* Prevent overflow */
            overflow-wrap: break-word;
            max-width: 100%; /* Batasi lebar */
            padding-right: 10px; /* Padding kanan */
        }

        .division-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, var(--nebula-pink), var(--cosmic-blue));
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(192, 38, 211, 0.4);
        }

        /* Message Pod */
        .message-pod {
            width: 100%;
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 16px;
            padding: 25px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        .message-pod::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 3rem;
            color: rgba(251, 191, 36, 0.3);
            font-family: serif;
            line-height: 1;
        }

        .message-text {
            font-style: italic;
            color: var(--supernova-gold);
            line-height: 1.6;
            position: relative;
            z-index: 1;
            padding-left: 10px;
        }

        /* Reset Button */
        .wormhole-reset {
            margin-top: 30px;
            padding: 15px 35px;
            background: transparent;
            border: 2px solid rgba(96, 165, 250, 0.5);
            border-radius: 30px;
            color: var(--starlight);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .wormhole-reset:hover {
            background: rgba(96, 165, 250, 0.2);
            border-color: var(--starlight);
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.3);
        }

        /* Error Message */
        .error-wormhole {
            background: rgba(220, 38, 38, 0.2);
            border: 1px solid rgba(220, 38, 38, 0.5);
            color: #fecaca;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .error-wormhole::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ef4444, transparent);
            animation: errorPulse 2s infinite;
        }

        @keyframes errorPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Particle Explosion */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particleExplode 1s ease-out forwards;
        }

        @keyframes particleExplode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Loading Animation */
        .warp-loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
        }

        .warp-core {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--starlight);
            border-right-color: var(--nebula-pink);
            animation: warpSpin 1s linear infinite;
            position: relative;
        }

        .warp-core::before,
        .warp-core::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 4px solid transparent;
        }

        .warp-core::before {
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border-top-color: var(--supernova-gold);
            animation: warpSpin 2s linear infinite reverse;
        }

        .warp-core::after {
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border-top-color: var(--alien-green);
            animation: warpSpin 1.5s linear infinite;
        }

        @keyframes warpSpin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .logo-glow { font-size: 1.5rem; letter-spacing: 4px; }
            .nebula-card { padding: 30px 20px; }
            .hologram-card { height: 550px; }
            .reveal-side { padding: 25px; }
            .avatar-glow { width: 90px; height: 90px; font-size: 2.5rem; }
            .recipient-name { font-size: 1.3rem; }
            .data-crystal { padding: 18px; }
            .crystal-value { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="cosmos"></div>
    <div class="galaxy"></div>
    <div class="starfield" id="starfield"></div>

    <!-- Server Status -->
    <div class="server-status" id="serverStatus">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Menghubungkan...</span>
    </div>

    <!-- Main Portal -->
    <div class="portal">
        <!-- Header -->
        <div class="celestial-header">
            <h1 class="logo-glow">Aspiriant Reveal for Cawu 3</h1>
            <p class="subtitle">Sistem Pengumuman Galaksi</p>
        </div>

        <!-- Login Form -->
        <div class="nebula-card" id="loginCard">
            <div class="card-content">
                <div class="error-wormhole" id="errorMsg">
                    <span>⚠️</span>
                    <span id="errorText">Data tidak ditemukan dalam database</span>
                </div>

                <form id="revealForm">
                    <div class="input-wormhole">
                        <label>🆔 Nomor ID</label>
                        <input type="text" class="cosmic-input" id="userId" placeholder="Masukkan ID Anda" required>
                    </div>

                    <div class="input-wormhole">
                        <label>🎂 Tanggal Lahir</label>
                        <input type="text" class="cosmic-input" id="birthDate" placeholder="YYYY/MM/DD" required maxlength="10">
                        <div class="date-hint">Format: Tahun/Bulan/Tanggal (Contoh: 2000/05/15)</div>
                    </div>

                    <button type="submit" class="warp-button">
                        🚀 Initiate Reveal Sequence
                    </button>
                </form>
            </div>
        </div>

        <!-- Hologram Result -->
        <div class="hologram-container" id="hologramContainer">
            <div class="hologram-card" id="hologramCard" onclick="revealCard()">              
                <div class="card-side reveal-side" id="revealContent">
                    <!-- Content injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div class="warp-loader" id="warpLoader">
        <div class="warp-core"></div>
    </div>

<script>
    // State
    let isRevealed = false;
    let currentTilt = { x: 0, y: 0 };

    // Create cosmic background
    function createCosmos() {
        const starfield = document.getElementById('starfield');
        
        for (let i = 0; i < 50; i++) {
            const dust = document.createElement('div');
            dust.className = 'cosmic-dust';
            dust.style.left = Math.random() * 100 + '%';
            dust.style.width = Math.random() * 3 + 'px';
            dust.style.height = dust.style.width;
            dust.style.animationDuration = (15 + Math.random() * 20) + 's';
            dust.style.animationDelay = Math.random() * 10 + 's';
            dust.style.opacity = Math.random() * 0.7;
            starfield.appendChild(dust);
        }

        setInterval(() => {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.top = Math.random() * 50 + '%';
            star.style.left = Math.random() * 50 + '%';
            starfield.appendChild(star);
            setTimeout(() => star.remove(), 3000);
        }, 4000);
    }
    createCosmos();

    // Check server status
    async function checkServerStatus() {
        try {
            const response = await fetch('/api/client/stats');
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (response.ok) {
                const data = await response.json();
                dot.classList.remove('offline');
                text.textContent = `Server Online • ${data.name}`;
            } else {
                throw new Error('No active dataset');
            }
        } catch (err) {
            document.getElementById('statusDot').classList.add('offline');
            document.getElementById('statusText').textContent = 'Server Offline / No Data';
        }
    }
    checkServerStatus();
    setInterval(checkServerStatus, 30000);

    // Auto-format date input
    const dateInput = document.getElementById('birthDate');
    dateInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length >= 4) value = value.slice(0, 4) + '/' + value.slice(4);
        if (value.length >= 7) value = value.slice(0, 7) + '/' + value.slice(7, 9);
        e.target.value = value;
    });

    // Form Submit
    document.getElementById('revealForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const userId = document.getElementById('userId').value.trim();
        const birthDate = document.getElementById('birthDate').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        const dateRegex = /^\d{4}\/\d{2}\/\d{2}$/;
        if (!dateRegex.test(birthDate)) {
            errorText.textContent = 'Format tanggal harus YYYY/MM/DD (Contoh: 2000/05/15)';
            errorMsg.style.display = 'flex';
            return;
        }

        showLoader(true);
        errorMsg.style.display = 'none';

        try {
            const response = await fetch('/api/client/reveal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nim: nim, tanggal_lahir: birthDate })
            });

            const result = await response.json();

            if (response.ok && result.found) {
                showResult(result.data);
            } else {
                errorText.textContent = result.error || 'Data tidak ditemukan. Periksa ID dan Tanggal Lahir.';
                errorMsg.style.display = 'flex';
            }
        } catch (err) {
            errorText.textContent = 'Gagal terhubung ke server. Coba lagi.';
            errorMsg.style.display = 'flex';
        } finally {
            showLoader(false);
        }
    });

    // Show Result
    function showResult(data) {
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('hologramContainer').style.display = 'block';
        
        // Reset reveal state
        isRevealed = false;

        const revealContent = document.getElementById('revealContent');
        revealContent.innerHTML = `
            <div class="avatar-glow">👨‍🚀</div>
            <div class="recipient-name">${data.nama}</div>
            <div class="recipient-id">ID: ${data.user_id}</div>

            <div class="data-crystal">
                <div class="crystal-label">Posisi</div>
                <div class="crystal-value">${data.posisi}</div>
            </div>

            <div class="data-crystal">
                <div class="crystal-label">Divisi</div>
                <div class="crystal-value">${data.divisi}</div>
            </div>

            <div class="message-pod">
                <div class="message-text">${data.pesan}</div>
            </div>

            <button class="wormhole-reset" onclick="resetPortal(event)">
                🔄 Cek Data Lain
            </button>
        `;
        
        // Re-attach click handler
        attachCardClickHandler();
    }

    // Attach click handler ke card
    function attachCardClickHandler() {
        const card = document.getElementById('hologramCard');
        const mysterySide = card.querySelector('.mystery-side');
        
        // Hapus event listener lama jika ada
        mysterySide.onclick = null;
        
        // Tambah event listener baru
        mysterySide.onclick = function(e) {
            e.stopPropagation();
            revealCard();
        };
    }

    // Reveal Card Animation - PERBAIKAN UTAMA
    function revealCard() {
        if (isRevealed) return; // Cegah double click
        
        const card = document.getElementById('hologramCard');
        
        // Hapus event listener tilt agar tidak conflict
        document.removeEventListener('mousemove', handleTilt);
        document.removeEventListener('mouseleave', resetTilt);
        
        // Tambah class revealed
        card.classList.add('revealed');
        isRevealed = true;
        
        // Trigger particle effect
        setTimeout(() => {
            createParticleExplosion();
        }, 300);
    }

    // Tilt effect handlers
    function handleTilt(e) {
        const card = document.getElementById('hologramCard');
        if (!card || isRevealed) return;
        
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        const rotateX = (y - centerY) / 20;
        const rotateY = (centerX - x) / 20;
        
        currentTilt = { x: rotateX, y: rotateY };
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    }

    function resetTilt() {
        const card = document.getElementById('hologramCard');
        if (!card || isRevealed) return;
        
        currentTilt = { x: 0, y: 0 };
        card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
    }

    // Particle Explosion Effect
    function createParticleExplosion() {
        const card = document.getElementById('hologramCard');
        const rect = card.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const colors = ['#60a5fa', '#c026d3', '#fbbf24', '#34d399', '#ffffff'];

        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = centerX + 'px';
            particle.style.top = centerY + 'px';
            particle.style.width = Math.random() * 8 + 4 + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            const angle = (Math.PI * 2 * i) / 50;
            const velocity = 100 + Math.random() * 200;
            particle.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
            particle.style.setProperty('--ty', Math.sin(angle) * velocity + 'px');
            
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 1000);
        }
    }

    // Reset Portal
    function resetPortal(e) {
        if (e) e.stopPropagation();
        
        const card = document.getElementById('hologramCard');
        
        // Reset state
        isRevealed = false;
        card.classList.remove('revealed');
        card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
        
        // Re-attach tilt listeners
        setTimeout(() => {
            document.addEventListener('mousemove', handleTilt);
            document.addEventListener('mouseleave', resetTilt);
        }, 100);
        
        // Switch view
        setTimeout(() => {
            document.getElementById('hologramContainer').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('revealForm').reset();
            document.getElementById('revealContent').innerHTML = '';
        }, 600);
    }

    // UI Helpers
    function showLoader(show) {
        document.getElementById('warpLoader').style.display = show ? 'block' : 'none';
    }

    // Initialize tilt effect
    document.addEventListener('mousemove', handleTilt);
    document.addEventListener('mouseleave', resetTilt);
    
    // Attach initial click handler
    attachCardClickHandler();
</script>
</body>
</html>
